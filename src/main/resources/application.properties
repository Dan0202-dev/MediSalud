spring.application.name=agendamiento

# Puerto: usa la variable de entorno PORT si existe (requerido por Render y otros
# PaaS); en local cae a 8080 por defecto.
server.port=${PORT:8080}

# ---------------------------------------------------------------------------
# Base de datos H2 en archivo (persiste entre reinicios).
# AUTO_SERVER permite abrir la consola web mientras la app corre.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/medisalud;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Consola H2 DESACTIVADA por defecto (seguridad: no exponerla en produccion).
# Se habilita solo con el perfil 'dev' (ver application-dev.properties):
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
spring.h2.console.enabled=false

# Swagger UI en http://localhost:8080/swagger-ui.html  |  OpenAPI JSON en /v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Zona horaria fija para toda la aplicacion (documentada en el README).
app.zona-horaria=America/Bogota

# Reglas de negocio configurables
# RN-01: dias festivos sin atencion (ISO yyyy-MM-dd, separados por coma)
app.festivos=2026-01-01,2026-05-01,2026-12-25
# RN-05: umbral y ventana de penalizaciones que bloquean el agendamiento
app.penalizaciones.umbral=3
app.penalizaciones.ventana-dias=30
# RF-04: rango maximo (dias) permitido en la consulta de disponibilidad
app.disponibilidad.max-dias=31
