# Perfil de desarrollo: habilita utilidades que NO deben quedar expuestas en produccion.
# Activar con: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#          o:  java -jar app.jar --spring.profiles.active=dev

# Consola H2 en http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
